name: Build Installers

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ─── Windows x64 ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scheduler/requirements.txt pyinstaller

      - name: Copy scheduler config
        shell: bash
        run: cp scheduler/config/scheduler_config.template.yaml scheduler/config/scheduler_config.yaml

      - name: Bundle Python backend (PyInstaller)
        shell: bash
        run: |
          pyinstaller scheduler_server.spec \
            --distpath dist_backend \
            --workpath build_pyinstaller \
            --noconfirm

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Windows installer
        working-directory: frontend
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-vite build && npx electron-builder --win --publish=never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          if-no-files-found: error

  # ─── macOS ARM64 (Apple Silicon — M1/M2/M3/M4) ──────────────────────────────
  # Intel Mac users: install Rosetta 2 — the ARM64 binary runs via Rosetta.
  # Requires GitHub secrets:
  #   APPLE_CERTIFICATE              — base64-encoded Developer ID Application .p12
  #   APPLE_CERTIFICATE_PASSWORD     — password for that .p12
  #   APPLE_ID                       — Apple ID email used for notarization
  #   APPLE_APP_SPECIFIC_PASSWORD    — app-specific password (appleid.apple.com)
  #   APPLE_TEAM_ID                  — 10-character Team ID (developer.apple.com)
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scheduler/requirements.txt pyinstaller

      - name: Copy scheduler config
        run: cp scheduler/config/scheduler_config.template.yaml scheduler/config/scheduler_config.yaml

      - name: Bundle Python backend (PyInstaller)
        run: |
          pyinstaller scheduler_server.spec \
            --distpath dist_backend \
            --workpath build_pyinstaller \
            --noconfirm

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Certificate import ─────────────────────────────────────────────────
      # Creates a short-lived keychain, imports the Developer ID cert so that
      # electron-builder (via CSC_LINK / CSC_KEY_PASSWORD) can sign the app.
      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          # Decode the .p12
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/certificate.p12"

          # Create and configure a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate (allow codesign to use it without prompts)
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add the keychain to the search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      # ── Sign, notarize, and package ────────────────────────────────────────
      # The cert is already in the keychain from the previous step — do NOT set
      # CSC_LINK/CSC_KEY_PASSWORD or electron-builder will try to re-import it
      # (causing a "wrong password" conflict). It will auto-discover the
      # Developer ID Application identity from the search keychain instead.
      # APPLE_* env vars are picked up by scripts/notarize.js (afterSign hook).
      - name: Build macOS DMG (sign + notarize)
        working-directory: frontend
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --arm64 --publish=never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg
          if-no-files-found: error

  # ─── GitHub Release (tag pushes only) ───────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "KEA Physician Scheduler ${{ github.ref_name }}"
          body: |
            ## Downloads
            | Platform | File |
            |---|---|
            | Windows (x64) | `KEA Physician Scheduler Setup *.exe` |
            | macOS (Apple Silicon + Intel via Rosetta 2) | `*.dmg` |

            > **macOS note:** The app is signed and notarized. Double-click the DMG to install normally.
          files: |
            windows-installer/*.exe
            macos-dmg/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Installers

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ─── Windows x64 ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scheduler/requirements.txt pyinstaller

      - name: Copy scheduler config
        shell: bash
        run: cp scheduler/config/scheduler_config.template.yaml scheduler/config/scheduler_config.yaml

      - name: Bundle Python backend (PyInstaller)
        shell: bash
        run: |
          pyinstaller scheduler_server.spec \
            --distpath dist_backend \
            --workpath build_pyinstaller \
            --noconfirm

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Windows installer
        working-directory: frontend
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-vite build && npx electron-builder --win --publish=never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          if-no-files-found: error

  # ─── macOS ARM64 (Apple Silicon — M1/M2/M3/M4) ──────────────────────────────
  # Intel Mac users: install Rosetta 2 (System Preferences → General → Software
  # Update → More Info) — the ARM64 binary runs transparently via Rosetta.
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scheduler/requirements.txt pyinstaller

      - name: Copy scheduler config
        run: cp scheduler/config/scheduler_config.template.yaml scheduler/config/scheduler_config.yaml

      - name: Bundle Python backend (PyInstaller)
        run: |
          pyinstaller scheduler_server.spec \
            --distpath dist_backend \
            --workpath build_pyinstaller \
            --noconfirm

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build macOS DMG
        working-directory: frontend
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --arm64 --publish=never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg
          if-no-files-found: error

  # ─── GitHub Release (tag pushes only) ───────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "KEA Physician Scheduler ${{ github.ref_name }}"
          body: |
            ## Downloads
            | Platform | File |
            |---|---|
            | Windows (x64) | `KEA Physician Scheduler Setup *.exe` |
            | macOS (Apple Silicon + Intel via Rosetta 2) | `*.dmg` |

            > **macOS note:** The app is unsigned. On first launch, right-click the DMG → Open to bypass Gatekeeper.
          files: |
            windows-installer/*.exe
            macos-dmg/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ============================================================
# Physician Roster
# ============================================================
# Source: SM-rules.md (parsed 2026-03-20)
#
# scheduling.group_b_site_preference — within Group B (62% target):
#   nehc  : prefer NEHC
#   rah   : prefer RAH I or RAH F
#   rah_f : prefer specifically RAH F side
#   (omit): no preference within Group B
#
# scheduling.max_consecutive_shifts — hard cap on back-to-back days
#   Global default is 3; only listed here when it differs or for clarity.
#
# rule_overrides — submission validation exceptions only.
#   Omit or use {} for standard rules.
# ============================================================

